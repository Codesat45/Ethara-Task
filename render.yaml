services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: ethara-task-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_ORIGINS
        value: "https://ethara-task-frontend-i2zx.onrender.com,http://localhost:5173,http://localhost:3000"
    healthCheckPath: /health

  # ── Frontend (React/Vite) ──────────────────────────────────────────────────
  - type: web
    name: ethara-task-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://ethara-task-3597.onrender.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
